repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: ^\\.secrets\\.baseline$
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: python -m ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format
        name: ruff-format
        entry: python -m ruff format --check .
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: python -m pytest -q
        language: system
        pass_filenames: false
      - id: pyright
        name: pyright
        entry: python -m pyright
        language: system
        pass_filenames: false
      - id: release-preflight
        name: release-preflight
        entry: python tests/release_preflight.py
        language: system
        pass_filenames: false
