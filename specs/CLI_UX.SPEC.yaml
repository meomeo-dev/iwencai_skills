spec_id: cli_ux
version: 1
program_name: iwencai
entrypoint: iwencai
development_entrypoint: python iwencai_cli.py
packaging:
  console_script: iwencai
  module_entrypoint: iwencai_cli:main
principles:
  - single_file_runtime
  - machine_readable_by_default
  - human_friendly_table_output_when_requested
  - family_first_subcommands
  - direct_query2data_without_skill_binding
top_level_commands:
  - name: query2data
    purpose: execute the generic query2data family directly
    required_options:
      - --query
    optional_options:
      - --page
      - --limit
      - --all-pages
      - --is-cache
      - --format
      - --output
      - --api-key
  - name: search
    purpose: execute the generic comprehensive/search family directly
    required_options:
      - --query
    optional_options:
      - --channel
      - --limit
      - --format
      - --output
      - --api-key
  - name: trade
    purpose: execute simulate trading actions
    subcommands:
      - bootstrap-account
      - show-account
      - buy
      - sell
      - positions
      - profit
      - fund
      - today-trades
      - history-trades
      - gain-30d
output_formats:
  - json
  - jsonl
  - table
search_channels:
  - announcement
  - investor
  - news
  - report
routing:
  behavior_when_subcommand_is_omitted: default_to_query2data
  behavior_when_search_channel_is_omitted: search_all_official_channels
  behavior_when_channels_are_invalid: reject_request
help_surface:
  top_level_markers:
    - family 子命令
    - 省略 family 时，默认按 query2data 执行
    - 快速开始
    - iwencai -q "2连板股票"
    - Query 写法
    - 主体 + 指标/事件
    - 实体/主题 + 内容类型 + 时间词
  query2data_markers:
    - 查询输入
    - 分页控制
    - 请求控制
    - 身份认证
    - 输出控制
    - 不需要指定 skill
    - 问财更像弱 DSL
    - 主体 + 指标/事件
    - 范围 + 条件/排序 + 时间窗
  search_markers:
    - 查询输入
    - 搜索范围
    - 身份认证
    - 输出控制
    - 可用 channel
    - announcement, investor, news, report
    - 实体/主题 + 内容类型 + 时间词
    - 不要只写公司名或主题名
    - 多主体时拆分查询
  trade_markers:
    - 交易动作
    - 首次使用建议先执行 bootstrap-account
    - iwencai trade bootstrap-account
  trade_buy_markers:
    - 交易参数
    - 数量必须为 100 股整数倍
    - iwencai trade buy --stock-code 600519 --price 1500 --quantity 100
common_error_codes:
  - missing_api_key
  - invalid_search_channel
  - unsupported_action
  - invalid_date
  - invalid_trade_quantity
  - invalid_trade_direction
